version: "3.9"

# DATABASE_URL like postgres://...@alm_db:5432/db only works if this container
# shares a user-defined Docker network with the Postgres container named alm_db.
# One-time on server: docker network create alm-shared && docker network connect alm-shared alm_db
#
# Redis: use the shared alm_redis container on alm-shared (started by main ALM stack).
# Do NOT define alm-redis here — name conflicts with ~/alm-main on the same server.
# Set REDIS_URL=redis://alm_redis:6379/0 in .env.production
#
# MinIO (mansoor-minio) lives on external network mansoor-s-app-backend_mansoor-net.
# Compose joins that network so MINIO_END_POINT=mansoor-minio works after every recreate.

services:
  alm-backend:
    container_name: alm-tenant-backend
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    ports:
      - "5001:5001"
    restart: unless-stopped
    networks:
      - alm-shared
      - mansoor-net

networks:
  alm-shared:
    external: true
  mansoor-net:
    external: true
    name: mansoor-s-app-backend_mansoor-net
